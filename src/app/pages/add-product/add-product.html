<div class="add-product-page mesh-bg py-5">
  <div class="container">
    
    <!-- Category Selection (Wizard Style) -->
    <div class="wizard-container anim-fade-up" *ngIf="!selectedCategory()">
      <div class="text-center mb-5">
        <div class="badge bg-success-subtle text-success px-3 py-2 rounded-pill mb-3">Farmer Dashboard</div>
        <h1 class="display-5 fw-bold text-dark">List your Farm Produce</h1>
        <p class="text-muted lead">Choose a category to reach thousands of buyers instantly.</p>
      </div>

      <div class="cat-grid-farmer ">
        <div class="cat-card-glass border border-1 border-success" *ngFor="let cat of categories" (click)="selectCategory(cat.name)">
          <div class="cat-icon-wrap" [ngClass]="cat.name">
            <i class="fa-solid" [ngClass]="cat.icon"></i>
          </div>
          <div class="cat-body">
            <h3>{{ cat.name }}</h3>
            <p>{{ cat.desc }}</p>
          </div>
          <div class="cat-footer">
            <span>Get Started</span>
            <i class="fa-solid fa-arrow-right"></i>
          </div>
        </div>
      </div>

      <div class="mt-5 text-center">
        <button class="btn btn-outline-secondary px-4 py-2 rounded-pill" (click)="onCancel()">
          <i class="fa-solid fa-arrow-left me-2"></i> Back to My Sales
        </button>
      </div>
    </div>

    <!-- The Actual Form Component -->
    <div class="form-container anim-fade-up" *ngIf="selectedCategory()">
      <div class="glass-form-card">
        <app-add-product-form 
          [selectedCategory]="selectedCategory()"
          (saved)="onSaved()"
          (cancel)="onCancel()"
        ></app-add-product-form>
      </div>
    </div>

  </div>
</div>
