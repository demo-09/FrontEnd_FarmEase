<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <!-- Load environment variables before Angular modules load -->
  <script>
    (function() {
      var request = new XMLHttpRequest();
      request.open('GET', '/config.json', false);
      try {
        request.send(null);
        if (request.status === 200) {
          var config = JSON.parse(request.responseText);
          window.process = {
            env: {
              GEMINI_API_KEY: config.geminiApiKey || '',
              API_URL: config.apiUrl || 'https://backend-farmease-1.onrender.com',
              CLOUDINARY_CLOUD_NAME: config.cloudinaryCloudName || '',
              CLOUDINARY_UPLOAD_PRESET: config.cloudinaryUploadPreset || ''
            }
          };
        }
      } catch (e) {
        console.error('Failed to load configuration synchronously:', e);
      }
      if (!window.process) {
        window.process = {
          env: {
            API_URL: 'https://backend-farmease-1.onrender.com'
          }
        };
      }
    })();
  </script>

  <title>FarmEase - Smart Farming Platform</title>
