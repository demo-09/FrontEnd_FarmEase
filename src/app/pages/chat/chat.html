<!-- Chat Page — Premium Redesign -->
<div class="container py-4" style="padding-top:100px!important">
  <div class="chat-wrapper">

    <!-- Sidebar -->
    <div class="chat-sidebar">
      <div class="sidebar-header">
        <h3><i class="fa-solid fa-users me-2"></i>Contacts</h3>
      </div>

      <div class="contact-list">
        <div class="contact-item"
             *ngFor="let contact of chatService.contacts()"
             [class.active]="chatService.selectedContact()?.email === contact.email"
             (click)="selectContact(contact)">
          <div class="avatar">
            <img [src]="contact.fullName
              ? 'https://ui-avatars.com/api/?name=' + contact.fullName + '&background=0a3d20&color=fff&bold=true&size=80'
              : 'https://ui-avatars.com/api/?name=Guest&background=0a3d20&color=fff&bold=true&size=80'"
                 class="drawer-avatar" alt="Profile">
          </div>
          <div>
            <div class="contact-name">{{ contact.fullName }}</div>
            <div class="contact-role">{{ contact.role }}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-main" *ngIf="chatService.selectedContact(); else noContact">

      <!-- Header -->
      <header class="chat-header">
        <div class="header-name">
          <img [src]="chatService.selectedContact()?.fullName
            ? 'https://ui-avatars.com/api/?name=' + chatService.selectedContact()?.fullName + '&background=0a3d20&color=fff&bold=true&size=80'
            : 'https://ui-avatars.com/api/?name=Guest&background=0a3d20&color=fff&bold=true&size=80'"
               class="drawer-avatar" alt="Profile">
          {{ chatService.selectedContact()?.fullName }}
        </div>
        <div style="font-size:0.78rem;color:#16a34a;font-weight:700;display:flex;align-items:center;gap:6px">
          <span style="width:7px;height:7px;background:#4ade80;border-radius:50%;display:inline-block"></span>
          {{ chatService.selectedContact()?.role | titlecase }}
        </div>
      </header>

      <!-- Messages -->
      <div class="chat-messages-area" #chatScroll>
        <ng-container *ngIf="chatService.messages().length > 0; else emp">
          <div class="messages-wrapper">
            <div class="message-wrapper"
                 *ngFor="let msg of chatService.messages()"
                 [ngClass]="msg.senderEmail === currentUserEmail ? 'msg-sent' : 'msg-received'">
              <div class="message-bubble">
                <p>{{ msg.content }}</p>
              </div>
            </div>
          </div>
        </ng-container>

        <ng-template #emp>
          <div class="empty-chat">
            <div class="emoji-bounce">💬</div>
            <h1 class="genz-title">Start a Conversation</h1>
            <p class="genz-sub">Say hello and grow your farming network 🌾</p>
          </div>
        </ng-template>
      </div>

      <!-- Input -->
      <div class="chat-input-wrapper">
        <div class="input-container">
          <input type="text" class="ai-input" placeholder="Type a message..."
                 [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" id="chat-msg-input">
          <button (click)="sendMessage()" [class.active]="newMessage.trim().length > 0" id="chat-send-btn">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- No Contact Selected -->
    <ng-template #noContact>
      <div class="no-contact-selected">
        <i class="fa-regular fa-comments"></i>
        <h2>Select a contact to start chatting</h2>
      </div>
    </ng-template>

  </div>
</div>
