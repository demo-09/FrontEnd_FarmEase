<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-visual-bg">
      <div class="particles">
        <div class="particle" *ngFor="let p of [1,2,3,4,5,6]"></div>
      </div>
      <div class="orbit-ring"></div>
      <div class="orbit-ring orbit-ring-2"></div>
    </div>

    <div class="auth-visual-content">
      <div class="floating-cards">
        <div class="feat-card anim-slide-left delay-1">
          <div class="feat-icon"><i class="fa-solid fa-seedling"></i></div>
          <div>
            <div class="feat-title">Farmer Network</div>
            <div class="feat-sub">2,400+ verified farmers</div>
          </div>
        </div>
        <div class="feat-card anim-slide-left delay-3">
          <div class="feat-icon amber"><i class="fa-solid fa-shield-halved"></i></div>
          <div>
            <div class="feat-title">Secure & Private</div>
            <div class="feat-sub">End-to-end encrypted</div>
          </div>
        </div>
      </div>

      <div class="auth-visual-text anim-fade-up delay-4">
        <div class="section-label">Join the Harvest</div>
        <h2 class="section-title" style="font-size:2.2rem;color:#f0fdf4;">
          Start Your Smart<br><span>Farming Journey</span>
        </h2>
        <div class="auth-stats anim-fade-up delay-6">
          <div class="auth-stat"><div class="auth-stat-n">Free</div><div class="auth-stat-l">Forever</div></div>
          <div class="auth-stat-divider"></div>
          <div class="auth-stat"><div class="auth-stat-n">24/7</div><div class="auth-stat-l">Support</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-form-panel signup-panel">
    <div class="auth-form-card anim-slide-right">
      <div class="auth-form-header anim-fade-down delay-1">
        <div class="brand-icon"><i class="fa-solid fa-leaf"></i></div>
        <div class="auth-form-badge">New Member</div>
      </div>

      <h1 class="auth-title anim-fade-up delay-2">Create Account</h1>
      <p class="auth-sub anim-fade-up delay-3">Select your role and fill in your details.</p>

      <div class="role-tabs anim-fade-up delay-3">
        <div class="role-tab" [class.active]="selectedRole === 'customer'" (click)="setRole('customer')">
          <i class="fa-solid fa-user"></i> Customer
        </div>
        <div class="role-tab" [class.active]="selectedRole === 'farmer'" (click)="setRole('farmer')">
          <i class="fa-solid fa-wheat-awn"></i> Farmer
        </div>
        <div class="role-tab" [class.active]="selectedRole === 'admin'" (click)="setRole('admin')">
          <i class="fa-solid fa-user-shield"></i> Admin
        </div>
      </div>

      <form class="signup-form">
        <div class="form-row-2">
          <div class="form-floating-dark anim-fade-up delay-4">
            <label>Full Name *</label>
            <input #nameInput type="text" placeholder="John Doe">
          </div>
          <div class="form-floating-dark anim-fade-up delay-4">
            <label>Email Address *</label>
            <input #emailInput type="email" placeholder="you@example.com">
          </div>
        </div>

        <div class="form-row-2">
          <div class="form-floating-dark anim-fade-up delay-5">
            <label>Phone</label>
            <input #phoneInput type="tel" placeholder="+91 00000 00000">
          </div>
          <div class="form-floating-dark anim-fade-up delay-5">
            <label>Date of Birth</label>
            <input #dobInput type="date">
          </div>
        </div>

        <div class="form-floating-dark anim-fade-up delay-6">
          <label>Address / Farm Location</label>
          <input #addressInput type="text" placeholder="Village, State, Zip">
        </div>

        <div class="form-floating-dark anim-fade-up delay-7">
          <label>Bio / Farm Details</label>
          <textarea #bioInput rows="2" placeholder="Briefly describe your farm..."></textarea>
        </div>

        <div class="form-floating-dark anim-fade-up delay-7">
          <label>Password *</label>
          <input #passInput type="password" placeholder="••••••••">
        </div>

        <button type="button" 
                class="btn-glow w-100 auth-submit anim-fade-up delay-8"
                [disabled]="isLoading"
                (click)="onRegister(nameInput.value, emailInput.value, phoneInput.value, dobInput.value, addressInput.value, bioInput.value, passInput.value)">
          <i *ngIf="!isLoading" class="fa-solid fa-seedling me-2"></i>
          <i *ngIf="isLoading" class="fa-solid fa-circle-notch fa-spin me-2"></i>
          {{ isLoading ? 'Creating Account...' : 'Complete Registration' }}
        </button>

        <p class="auth-switch anim-fade-up delay-8">
          Already a member? <a routerLink="/Login">Sign In <i class="fa-solid fa-arrow-right ms-1"></i></a>
        </p>
      </form>
    </div>
  </div>
</div>
