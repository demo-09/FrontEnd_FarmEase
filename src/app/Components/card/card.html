<!-- Premium Card Component -->
<div class="fe-card">
  
  <div class="fe-card-badge" *ngIf="data?.label">
    {{ data.label }}
  </div>

  <div class="fe-card-img-wrap">
    <img [src]="data?.imageUrl || 'https://images.unsplash.com/photo-1416879595882-3373a0480b5b?w=400'"
         class="fe-card-img"
         [alt]="data?.title"
         (error)="handleImageError($event)">
    <div class="fe-card-img-overlay">
       <i class="fa-solid fa-arrow-up-right-from-square"></i>
    </div>
  </div>

  <div class="fe-card-body">
    <div class="fe-card-header">
      <h5 class="fe-card-title">{{ data?.title || 'Untitled Item' }}</h5>
      <div class="fe-card-subtitle" *ngIf="data?.subtitle">
        <i class="fa-solid fa-tag"></i> {{ data.subtitle }}
      </div>
    </div>

    <p class="fe-card-desc">
      {{ (data?.description | slice:0:110) || 'No description provided.' }}...
    </p>

    <div class="fe-card-footer">
      <div class="fe-card-meta">
        <span class="fe-meta-text" *ngIf="data?.metaText">{{ data.metaText }}</span>
        <span class="fe-meta-date" *ngIf="data?.date">
          <i class="fa-regular fa-calendar-check"></i> {{ data.date }}
        </span>
      </div>

      <a [href]="data?.link || 'javascript:void(0)'" 
         class="fe-card-btn" 
         (click)="data?.action?.()">
        {{ data?.buttonText || 'Read Article' }} <i class="fa-solid fa-arrow-right"></i>
      </a>
    </div>
  </div>
</div>
