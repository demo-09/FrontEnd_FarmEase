<div class="chat-page-container">
  <div class="chat-wrapper">

    <div class="chat-sidebar" [class.mobile-hide]="chatService.selectedContact()">
      <div class="sidebar-header">
        <h3><i class="fa-solid fa-seedling me-2"></i>FarmEase</h3>
      </div>
      <div class="contact-list">
        <div class="contact-item"
             *ngFor="let contact of chatService.contacts()"
             (click)="selectContact(contact)"
             [class.active]="chatService.selectedContact()?.email === contact.email">
          <img [src]="'https://ui-avatars.com/api/?name=' + contact.fullName + '&background=22c55e&color=fff'"
               style="width:40px; border-radius:50%">
          <div>
            <div class="contact-name">{{ contact.fullName }}</div>
            <small style="opacity:0.7">{{ contact.role }}</small>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-main" [class.mobile-full]="chatService.selectedContact()" *ngIf="chatService.selectedContact(); else noChat">
      <header class="chat-header">
        <button class="btn d-md-none" (click)="chatService.selectedContact.set(null)">
          <i class="fa-solid fa-arrow-left text-success"></i>
        </button>
        <div class="header-name">
          <strong>{{ chatService.selectedContact()?.fullName }}</strong>
        </div>
      </header>

      <div class="chat-messages-area" #chatScroll>
        <div class="messages-wrapper">
          <div class="message-wrapper"
               *ngFor="let msg of chatService.messages()"
               [ngClass]="msg.senderEmail === currentUserEmail ? 'msg-sent' : 'msg-received'">
            <div class="message-bubble">
              {{ msg.content }}
            </div>
          </div>
        </div>
      </div>

      <div class="chat-input-wrapper">
        <div class="input-container">
          <input type="text" class="ai-input" placeholder="Type a message..." [(ngModel)]="newMessage" (keyup.enter)="sendMessage()">
          <button class="send-btn" (click)="sendMessage()">
            <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
      </div>
    </div>

    <ng-template #noChat>
      <div class="no-contact-selected">
        <i class="fa-regular fa-comments" style="font-size: 4rem; color: #d1d5db;"></i>
        <h2 class="mt-3">Select a farmer to chat</h2>
      </div>
    </ng-template>

  </div>
</div>
