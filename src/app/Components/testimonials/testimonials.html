<section class="team-section mesh-bg py-5 overflow-hidden w-100">
    <div class="container text-center mb-5 anim-fade-up">
        <span class="badge badge-green px-3 py-2 mb-2 fw-bold text-uppercase ls-1">The Crew</span>
        <h2 class="section-title fw-bold text-white text-shadow">Developed By</h2>
        <div class="bg-primary mx-auto rounded-pill glow-dot mt-3" style="width: 8px;"></div>
    </div>

    <div class="marquee-container anim-fade-in delay-2">
        <div class="marquee-track">
            <div class="team-card shadow-sm" *ngFor="let member of items">
                <div class="glass p-4 text-center hover-lift">
                    <div class="img-wrapper mb-3 mx-auto">
                        <img [src]="'https://ui-avatars.com/api/?name=' + member + '&background=22c55e&color=fff'" class="rounded-circle shadow-sm" />
                    </div>
                    <h5 class="fw-bold mb-1 text-white">{{member}}</h5>
                    <span class="text-primary small fw-semibold text-uppercase ls-1">Developer</span>
                </div>
            </div>

            <div class="team-card shadow-sm" *ngFor="let member of items">
                <div class="glass p-4 text-center hover-lift">
                    <div class="img-wrapper mb-3 mx-auto">
                        <img [src]="'https://ui-avatars.com/api/?name=' + member + '&background=22c55e&color=fff'" class="rounded-circle shadow-sm" />
                    </div>
                    <h5 class="fw-bold mb-1 text-white">{{ member }}</h5>
                    <span class="text-primary small fw-semibold text-uppercase ls-1">Developer</span>
                </div>
            </div>
        </div>
    </div>
</section>
